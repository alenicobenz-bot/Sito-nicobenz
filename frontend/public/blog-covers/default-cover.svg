<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B0B0C"/>
      <stop offset="100%" stop-color="#1a1410"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c8a96a"/>
      <stop offset="100%" stop-color="#e0c389"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <!-- Decorative grid lines -->
  <g stroke="#c8a96a" stroke-opacity="0.08" stroke-width="1">
    <line x1="0" y1="168.75" x2="1200" y2="168.75"/>
    <line x1="0" y1="337.5" x2="1200" y2="337.5"/>
    <line x1="0" y1="506.25" x2="1200" y2="506.25"/>
    <line x1="300" y1="0" x2="300" y2="675"/>
    <line x1="600" y1="0" x2="600" y2="675"/>
    <line x1="900" y1="0" x2="900" y2="675"/>
  </g>
  <!-- Center thin line accent -->
  <line x1="540" y1="280" x2="660" y2="280" stroke="url(#gold)" stroke-width="1.5"/>
  <!-- Brand text -->
  <text x="600" y="350" text-anchor="middle" fill="#F4EBD8" font-family="Georgia, 'Times New Roman', serif" font-size="64" font-weight="300" letter-spacing="2">
    Nico<tspan fill="url(#gold)">benz</tspan>
  </text>
  <text x="600" y="395" text-anchor="middle" fill="#8a8278" font-family="Helvetica, Arial, sans-serif" font-size="14" letter-spacing="4" font-weight="500">JOURNAL · BEAUTY SOCIAL COACH</text>
  <!-- Bottom decorative line -->
  <line x1="540" y1="430" x2="660" y2="430" stroke="url(#gold)" stroke-width="1.5"/>
</svg>
